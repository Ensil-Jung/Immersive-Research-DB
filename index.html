nce)의 확장된 의미로서의 공간연구: 연극 《메모리얼: 조용한 식탁》을 중심으로", "author": "권용", "year": "2017", "venue": "한국엔터테인먼트산업학회논문지", "url": "https://www.kci.go.kr/kciportal/ci/sereArticleSearch/ciSereArtiView.kci?sereArticleSearchBean.artiId=ART002248644", "pdf": "", "summary": "이머시브 공연이 무대-객석 경계를 해체하며 만드는 '확장된 공간' 개념을 사례 분석으로 규명한다. 관객을 창작 주체로 전환시키는 공간적 메커니즘을 이론화하여, 전통적 프로시니엄 무대와 대비되는 이머시브 공연 고유의 공간 문법을 제시한다.", "keywords": ["이머시브시어터", "공간디자인", "관객성", "참여", "메모리얼조용한식탁"]}, {"slug": "2017_남선숙_VR게임현존감", "title": "VR게임의 이용자 경험: 현존감이 즐거움에 미치는 영향을 중심으로", "author": "남선숙, 유홍식, 신동희", "year": "2017", "venue": "정보통신정책연구", "url": "https://kiss.kstudy.com/thesis/thesis-view.asp?key=3547862", "pdf": "", "summary": "Presence를 공간적/시간적 관여 등 하위요소로 분해해 즐거움에 미치는 영향을 실증분석, Flow 편중을 보완할 telepresence 근거를 제공한다.", "keywords": ["프레즌스", "VR", "게임", "플로우"]}, {"slug": "2018_Boyle_FlowImmersionVideoGames", "title": "Flow and Immersion in Video Games: The Aftermath of a Conceptual Challenge", "author": "Boyle, E. A. 등", "year": "2018", "venue": "학술지 미상", "url": "https://pmc.ncbi.nlm.nih.gov/articles/PMC6134042/", "pdf": "https://www.frontiersin.org/articles/10.3389/fpsyg.2018.01682/pdf", "summary": "몰입(immersion)과 플로우(flow)의 개념적 혼용 문제를 정리하고 몰입이 플로우의 전제조건이 될 수 있다는 관계를 재검토한다.", "keywords": ["플로우", "몰입이론", "게임"]}, {"slug": "2018_김태용_몰입개념차별화", "title": "정보처리 능력의 집중과 그에 따른 심리상태를 대변하는 개념들의 차별적 개념화와 조작화: 주의, 관여, 몰입, 프레즌스, 플로우를 중심으로 한 실증연구", "author": "김태용, 최영균, 김미경", "year": "2018", "venue": "광고학연구", "url": "https://www.earticle.net/Article/A332950", "pdf": "", "summary": "주의·관여·몰입·프레즌스·플로우 5개 유사개념을 국내 실증적으로 차별화하고 측정항목 타당도를 검증한 국내 유일급 개념정리 논문.", "keywords": ["몰입이론", "프레즌스", "플로우"]}, {"slug": "2020_PresenceFlowNarrativeAbsorption", "title": "Presence, flow, and narrative absorption: an interdisciplinary theoretical exploration with a new spatiotemporal integrated model based on predictive processing", "author": "(인지과학/서사이론 계열, 저자 미상)", "year": "2020", "venue": "학술지 미상", "url": "https://www.researchgate.net/publication/342642100", es: A Survey with Insights on Emerging LLM Integration", "author": "Mahdi Farrokhi Maleki, Richard Zhao", "year": "2024", "venue": "AIIDE", "url": "https://arxiv.org/abs/2410.15644", "pdf": "", "summary": "탐색·머신러닝·노이즈함수 기반 등 기존 PCG 기법을 정리하고 LLM 통합이 게임 콘텐츠·내러티브 생성 분야를 어떻게 재편하는지 짚은 최신 서베이.", "keywords": ["프로시저럴생성", "LLM", "게임", "생성형AI", "인터랙티브내러티브"]}, {"slug": "1909_VanGennep_RitesDePassage", "title": "Les rites de passage (The Rites of Passage)", "author": "Arnold van Gennep", "year": "1909 (프랑스어 원전) / 1960 (영역본)", "venue": "University of Chicago Press (단행본)", "url": "", "pdf": "https://archive.org/download/theritesofpassage/The%20Rites%20of%20Passage.pdf", "summary": "통과의례를 분리(separation)-전이(transition, limen)-재통합(incorporation)의 3단계 구조로 최초 정식화한 인류학 고전. 출생, 성년식, 결혼, 장례 등 다양한 문화권의 의례를 비교하여 인간 삶의 지위 변화가 공통적으로 이 3단계를 거친다는 것을 논증했다.", "keywords": ["통과의례", "리미널리티", "문턱공간"]}, {"slug": "1967_Turner_BetwixtAndBetween", "title": "Betwixt and Between: The Liminal Period in Rites de Passage", "author": "Victor Turner", "year": "1967", "venue": "Cornell University Press (단행본)", "url": "", "pdf": "https://dl1.cuni.cz/pluginfile.php/1147806/mod_folder/content/0/Turner%20Betwixt%20and%20Between%20The%20Forest%20of%20Symbols.pdf?forcedownload=1", "summary": "반 게넵의 전이 단계(limen)를 심화하여, 리미널 상태에 있는 존재가 '이것도 저것도 아닌(neither here nor there)' 구조적 모호성과 양가성을 지닌다는 것을 은데붐족 성년식 사례를 통해 논증한다. 리미널 존재자의 상징적 특성(무성, 익명성, 위계 소멸)을 정리했다.", "keywords": ["리미널리티", "통과의례", "문턱공간"]}, {"slug": "1969_Turner_TheRitualProcess", "title": "The Ritual Process: Structure and Anti-Structure", "author": "Victor Turner", "year": "1969", "venue": "Aldine Publishing (단행본)", "url": "", "pdf": "", "summary": "리미널리티 개념을 사회 구조 이론으로 확장하여 '코뮤니타스(communitas)' 개념을 제시한다. 리미널 상태의 집단은 위계와 구조가 해체된 평등하고 강렬한 유대(반구조, anti-structure)를 경험하며, 이는 사회의 정상 구조를 보완하는 기능을 한다고 주장한다.", "keywords": ["커뮤니타스", "리미널리티", "통과의례"]}, {"slug": "1974_Turner_LiminalToLiminoid", "title": "Liminal to Liminoid, in Play, Flow, and Ritual", "author": "Victor Turner", "year": "1974", "venue": "Rice University Studies", "url": "", "pdf": "", "summary": "산업사회에서는 의무적·집단적 '리미널' 의례가 쇠퇴하는 대신, 자발적·개인적 여가 활동인 '리미노이드(liminoid)'가 그 기능을 대체한다고 주장한다. 칙센트미하이의 flow 개념과 연결지어 놀이, 예술, 스포츠의 몰입 경험을 리미널리티 이론틀 안에 통합했다.", "keywords": ["리미널리티", "플로우", "통과의례", "게임", "일상"]}, {"slug": "1979_Suvin_EstrangementAndCognition", "title": "Estrangement and Cognition", "author": "Darko Suvin", "year": "1979", "venue": "Yale University Press (단행본)", "url": "", "pdf": "", "summary": "SF 장르론의 초석이 되는 논문으로, SF를 \"인지적 낯설게 하기(cognitive estrangement)\"의 문학으로 정의한다. 현실 세계의 규범을 낯설게 재배치하면서도 합리적·인지적 틀을 유지하는 서사 장치를 통해 SF와 판타지, 신화, 리얼리즘 서사를 구분하는 이론적 기준을 제시한다.", "keywords": ["인지적소격", "SF", "사변소설", "스토리텔링"]}, {"slug": "1993_ArnouldPrice_RiverMagic", "title": "River Magic: Extraordinary Experience and the Extended Service Encounter", "author": "Eric J. Arnould, Linda L. Price", "year": "1993", "venue": "Journal of Consumer Research", "url": "", "pdf": "", "summary": "터너의 리미널리티/코뮤니타스 개념을 소비자 행동 연구에 최초로 도입한 고전 논문. 리버 래프팅 체험 참가자들이 겪는 비일상적(extraordinary) 서비스 체험과 그 안에서 형성되는 코뮤니타스를 분석한다.", "keywords": ["소비자행동", "리미널리티", "커뮤니타스", "브랜드경험", "경험설계"]}, {"slug": "2001_Smith_LookingForLiminalityInArchitecturalSpace", "title": "Looking for Liminality in Architectural Space", "author": "Catherine Smith", "year": "2001", "venue": "Limen", "url": "", "pdf": "", "summary": "반 게넵-터너의 3단계 통과의례 모델을 건축 담론에 최초로 도입하여, 건축을 단순한 '건물'이 아니라 '인간-환경 관계'로 재정의한다. 문턱, 복도, 계단참 등 건축적 요소가 신체적·심리적 이행을 매개하는 방식을 분석한다.", "keywords": ["문턱공간", "건축", "리미널리티", "통과의례", "공간디자인"]}, {"slug": "2003_JoDaewonImJongyeop_LiminalSpaceArchitecture", "title": "리미널 스페이스의 특성과 건축적 응용 및 재현에 관한 연구", "author": "조대원, 임종엽", "year": "2003", "venue": "대한건축학회 학술발표대회 논문집", "url": "", "pdf": "", "summary": "인류학적 리미널 스페이스 개념을 국내 건축 담론에 조기 도입한 연구로, 리미널 공간의 특성(경계성, 모호성, 이행성)을 정리하고 이를 건축적으로 재현·응용하는 방법을 탐구한다.", "keywords": ["문턱공간", "건축", "공간디자인", "리미널리티"]}, {"slug": "2003_MeyerLand_ThresholdConceptsTroublesomeKnowledge1", "title": "Threshold Concepts and Troublesome Knowledge (1): Linkages to Ways of Thinking and Practising", "author": "Jan H. F. Meyer, Ray Land", "year": "2003", "venue": "Improving Student Learning (OCSLD)", "url": "", "pdf": "", "summary": "교육학에서 '문턱개념(threshold concepts)'을 최초로 명명한 논문. 학습자가 특정 개념을 통과할 때 겪는 불편하고 변형적인(transformative) 인지적 이행 과정을 리미널리티 어휘로 설명한다.", "keywords": ["학습", "교육", "리미널리티", "통과의례"]}, {"slug": "2005_MeyerLand_ThresholdConceptsTroublesomeKnowledge2", "title": "Threshold concepts and troublesome knowledge (2): Epistemological Considerations and a Conceptual Framework for Teaching and Learning", "author": "Jan H. F. Meyer, Ray Land", "year": "2005", "venue": "Higher Education", "url": "", "pdf": "", "summary": "문턱개념 이론을 인식론적으로 심화하여, 학습자가 리미널 상태(개념을 절반쯤 이해한 불안정한 상태)에 머무는 동안 겪는 혼란과 정체성 재구성을 체계적 틀로 제시한다.", "keywords": ["학습", "교육", "리미널리티", "통과의례"]}, {"slug": "2008_BouldVint_ThereIsNoSuchThingAsScienceFiction", "title": "There Is No Such Thing as Science Fiction", "author": "Mark Bould, Sherryl Vint", "year": "2008", "venue": "Palgrave Macmillan (단행본)", "url": "", "pdf": "", "summary": "SF를 단일하고 안정적인 본질을 가진 장르로 규정하는 것 자체가 불가능함을 논증하며, 장르는 텍스트 내재적 속성이 아니라 독자·시장·비평 담론이 구성하는 유동적 범주임을 주장한다. 본질주의적 장르론에 대한 비판적 개입이다.", "keywords": ["SF", "사변소설", "스토리텔링"]}, {"slug": "2008_Mendlesohn_RhetoricsOfFantasy", "title": "Rhetorics of Fantasy", "author": "Farah Mendlesohn", "year": "2008", "venue": "Wesleyan University Press (단행본)", "url": "", "pdf": "", "summary": "판타지 서사를 독자와 마법적 세계의 관계 맺는 방식에 따라 포탈-퀘스트(portal-quest), 몰입(immersive), 침입(intrusion), 리미널(liminal) 판타지의 네 수사학적 유형으로 분류한 판타지 장르론의 핵심 저작이다. 특히 포탈-퀘스트형은 주인공이 일상 세계에서 마법 세계로 문턱을 넘는 구조를, 리미널형은 그 경계 자체가 지속적으로 모호한 상태를 다룬다.", "keywords": ["포탈판타지", "판타지", "포탈", "리미널리티", "내러티브몰입"]}, {"slug": "2009_Thomassen_UsesAndMeaningsOfLiminality", "title": "The Uses and Meanings of Liminality", "author": "Bjørn Thomassen", "year": "2009", "venue": "International Political Anthropology", "url": "", "pdf": "", "summary": "리미널리티 개념이 인류학을 넘어 다양한 분야로 확산되면서 느슨하게 남용 tive playspace)'을 논증한다. 치료적 연극 체험에서 참가자가 겪는 경계적 자기성찰 과정을 분석한다.", "keywords": ["리미널리티", "참여", "체현", "경험설계"]}, {"slug": "2013_Petry_ConceptOfMagicCircleCriticalReading", "title": "The concept of magic circle: a critical reading", "author": "Alexandre dos Santos Petry", "year": "2013", "venue": "Obra Digital", "url": "", "pdf": "", "summary": "호이징가의 '매직서클' 개념을 반 게넵·터너의 통과의례/리미널리티 이론과 대조하며 비판적으로 재검토한다. 게임과 현실의 경계를 이론화해온 계보를 정리하고, 매직서클 개념의 한계와 리미널리티 이론과의 접합 가능성을 논한다.", "keywords": ["매직서클", "리미널리티", "게임", "통과의례", "일상", "허구"]}, {"slug": "2014_Thomassen_LiminalityAndTheModern", "title": "Liminality and the Modern: Living Through the In-Between", "author": "Bjørn Thomassen", "year": "2014", "venue": "Routledge (단행본)", "url": "", "pdf": "", "summary": "리미널리티를 특정 의례의 일시적 국면이 아니라 근대성 자체의 근본 조건으로 확장한다. 혁명, 이주, 팬데믹, 경제위기 등 현대 사회의 급변 상황을 리미널 조건으로 재해석하며, '영구적 리미널리티(permanent liminality)' 개념을 정교화한다.", "keywords": ["리미널리티", "통과의례", "일상"]}, {"slug": "2016_TaheriEtAl_ExperientialLiminoidConsumptionNightclubbing", "title": "Experiential liminoid consumption: the case of nightclubbing", "author": "Babak Taheri, Emma Gori, Kevin O'Gorman, Martin K. Hogg, Rebecca Farrington", "year": "2016", "venue": "Journal of Marketing Management", "url": "", "pdf": "", "summary": "나이트클럽 체험을 사례로 '체험적 리미노이드 소비(experiential liminoid consumption)' 모델을 제시한다. 일상에서 벗어난 여가 소비 공간에서 참가자들이 겪는 탈억제, 정체성 실험, 감각적 몰입을 분석한다.", "keywords": ["소비자행동", "리미널리티", "경험설계", "브랜드경험", "일상"]}, {"slug": "2017_ErdelyBreede_TalesFromTheTailgate", "title": "Tales from the tailgate: fandom, musical tourism and pilgrimage on identity transformations", "author": "Christine Erdely, Donna Breede", "year": "2017", "venue": "Journal of Fandom Studies", "url": "", "pdf": "", "summary": "음악 팬덤의 투어/순례 행위를 통과의례적 순례(pilgrimage)로 개념화하여, 팬들이 공연장 이동과 테일게이팅(tailgate) 문화를 통해 겪는 정체성 변형을 분석한다.", "keywords": ["팬덤", "관광", "통과의례", "리미널리티", "커뮤니타스"]}, {"slug": "2017_Oziewicz_SpeculativeFiction", "title": "Speculative Fiction", "author": "Marek Oziewicz", "year": "2017", "venue": "Oxford Research Encyclopedia of Literature", "url": "", "pdf": "", "summary": "\"사변소설(speculative fiction)\"이라는 우산 용어의 역사적 형성 과정과 SF·판타지·호러·유토피아/디스토피아를 포괄하는 정의를 체계적으로 정리한 백과사전 항목이다. 장르 경계 논쟁과 학술적 활용 현황을 개괄한다.", "keywords": ["사변소설", "SF", "판타지", "환상성"]}, {"slug": "2018_HarwoodSmith_Portals", "title": "\"Portals\" (Ch.8, Routledge Companion to Imaginary Worlds)", "author": "Jennifer Harwood-Smith", "year": "2018", "venue": "Routledge (단행본)", "url": "", "pdf": "", "summary": "상상 세계론(imaginary worlds studies)의 관점에서 포탈을 서사적 장치이자 세계와 세계를 잇는 구조적 인터페이스로 분석하며, 옷장·거울·문·차원의 균열 등 다양한 포탈 유형과 그 서사적 기능을 유형화한다.", "keywords": ["포탈", "세계관", "월드빌딩", "포탈판타지", "스토리텔링"]}, {"slug": "2018_Masson_NoTravellerReturns", "title": "No Traveller Returns", "author": "Sophie Masson", "year": "2018", "venue": "Papers: Explorations into Children's Literature", "url": "", "pdf": "", "summary": "아동·청소년 포탈판타지에서 주인공이 다른 세계로 떠났다가 다시 돌아오지 못하거나 변화된 채 돌아오는 \"귀환 실패/변형된 귀환\" 모티프를 분석하며, 이 모티프가 성장서사와 상실감을 동시에 함축함을 논한다.", "keywords": ["포탈판타지", "포탈", "통과의례", "일상", "스토리텔링"]}, {"slug": "2019_Lacy_ExpandingTheDefinitionOfLiminality", "title": "Expanding the Definition of Liminality", "author": "Dianna C. Lacy", "year": "2019", "venue": "University of New Orleans (석사학위논문)", "url": "", "pdf": "", "summary": "반 게넵과 빅터 터너의 고전적 통과의례 리미널리티 개념을 현대 문화 텍스트(문학, 대중문화)에 적용 가능하도록 확장하며, 공간적·심리적·사회적 리미널리티를 구분하는 다차원적 프레임워크를 제안한다.", "keywords": ["리미널리티", "통과의례", "커뮤니타스"]}, {"slug": "2019_Moseley_SpaceBetweenWorldsVR", "title": "The Space Between Worlds: Liminality, Multidimensional VR and Deep Immersion", "author": "R. Moseley", "year": "2019", "venue": "Intelligent Computing (Springer)", "url": "", "pdf": "", "summary": "리미널리티 개념을 VR 하드웨어 및 인터페이스 설계 원리로 직접 구현하는 연구. 여러 차원(다중세계) 사이의 '사이 공간'을 VR로 구현해 깊은 몰입(deep immersion)을 유도하는 설계 방법론을 제시한다.", "keywords": ["VR", "리미널리티", "문턱공간", "몰입이론", "경험설계"]}, {"slug": "2019_NohDaewon_SFGenreCharacteristicsLiteraryEducation", "title": "SF의 장르 특성과 융합적 문학교육", "author": "노대원", "year": "2019", "venue": "영주어문", "url": "", "pdf": "", "summary": "SF 장르의 인지적 낯설게 하기, 노붐(novum), 과학적 상상력 등 핵심 특성을 정리하고, 이를 문학교육 현장에서 타 학문과 융합적으로 활용할 수 있는 방안을 제시한다. 한국 문학교육 담론에서 SF/사변소설을 정식 장르로 다루는 시도이다.", "keywords": ["SF", "사변소설", "인지적소격", "교육", "학습"]}, {"slug": "2020_AhnSangwon_KoreanWebNovelBookPossession", "title": "한국 웹소설 '책빙의물'의 특성 연구", "author": "안상원", "year": "2020", "venue": "대중서사연구", "url": "", "pdf": "", "summary": "독자가 소설 속 등장인물의 몸에 빙의(憑依)해 이야기 안으로 들어가는 한국형 포탈 서사 \"책빙의물\"의 장르적 관습과 서사 구조를 분석하며, 텍스트와 독자의 경계가 허물어지는 메타픽션적 몰입 방식을 논한다.", "keywords": ["이세계물", "웹소설", "포탈", "허구", "내러티브몰입", "스토리텔링"]}, {"slug": "2020_ReichenbergerSmith_CoCreatingCommunitiesFandomsTourism", "title": "Co-creating communities: Fandoms in tourism spaces", "author": "Ilka Reichenberger, Melanie K. Smith", "year": "2020", "venue": "Tourist Studies", "url": "", "pdf": "", "summary": "관광 공간에서 팬덤이 공동체를 어떻게 공동창조(co-create)하는지 분석하며, 팬덤 커뮤니티 형성 과정을 코뮤니타스 이론과 관광학적 관점에서 통합적으로 다룬다.", "keywords": ["팬덤", "관광", "커뮤니타스", "참여"]}, {"slug": "2020_WuEtAl_LiminalityAndFestivals", "title": "Liminality and festivals — Insights from the East", "author": "Ming-Yan Wu, Xiang (Robert) Li, Eric Wood, et al.", "year": "2020", "venue": "Annals of Tourism Research", "url": "", "pdf": "https://eprints.leedsbeckett.ac.uk/id/eprint/6281/1/LiminalityFestivalsInsightsFromEastAM-WOOD.pdf", "summary": "중국 음악 페스티벌 참가자를 대상으로 자발적(spontaneous), 이념적(ideological), 규범적(normative) 코뮤니타스 3유형을 실증 분석하여, 동양적 맥락에서 리미널리티·코뮤니타스 개념을 재검토한다.", "keywords": ["페스티벌", "커뮤니타스", "리미널리티", "관광"]}, {"slug": "2021_DarveauCheikhAmmar_LiminalityConsumptionReview", "title": "The interplay between liminality and consumption: a systematic review", "author": "Josianne Darveau, Mohamed Cheikh-Ammar", "year": "2021", "venue": "International Journal of Consumer Studies", "url": "", "pdf": "", "summary": "리미널리티와 소비 행동의 관계를 다룬 기존 연구들을 체계적으로 검토하여, 리미널 소비의 유형(과도기 소비, 정체성 재구성 소비 등)을 지도화(mapping)한 리뷰 논문.", "keywords": ["소비자행동", "리미널리티", "통과의례"]}, {"slug": "2021_Horrigan_TheLiminoidInSinglePlayerVideogaming", "title": "The Liminoid in Single-Player Videogaming", "author": "Matthew Horrigan", "year": "2021", "venue": "Game Studies", "url": "", "pdf": "", "summary": "터너의 리미널/리미노이드 구분을 게임 연구에 정밀 적용한 논문. 싱글플레이어 비디오게임에서 플레이어와 아바타가 겹쳐지는 '유사성의 순간(moments of resemblance)'을 통해 리미노이드적 정체성 전이가 어떻게 발생하는지 분석한다.", "keywords": ["게임", "리미널리티", "아바타", "체현", "몰입이론"]}, {"slug": "2021_JiangXuejin_SohwanhuiGrowthNarrativeLiminalityCommunitas", "title": "중국 드라마 <소환희>(2019)의 성장 서사 연구 - 리미널리티와 커뮤니타스를 중심으로", "author": "Jiang Xuejin (장설금)", "year": "2021", "venue": "중국연구", "url": "", "pdf": "", "summary": "중국 드라마 <소환희>를 리미널리티와 커뮤니타스 개념으로 분석하여, 유수아동·이혼가정·사별가정 등 결핍을 지닌 청소년들의 성장 서사를 유형화한다.", "keywords": ["리미널리티", "커뮤니타스", "통과의례", "스토리텔링", "소환희"]}, {"slug": "2022_Devanny_SpeculativeSlipstreaming", "title": "'Speculative Slipstreaming'", "author": "Laura-Jane Devanny", "year": "2022", "venue": "Humanities (MDPI)", "url": "", "pdf": "", "summary": "SF·판타지·리얼리즘의 경계를 넘나드는 \"슬립스트림(slipstream)\" 서사 양식을 사변소설의 하위 개념으로 정리하며, 장르 혼합이 독자에게 주는 인지적 불확정성과 그 미학적 효과를 분석한다.", "keywords": ["사변소설", "SF", "판타지", "허구", "스토리텔링"]}, {"slug": "2022_JeonSeongwook_GhostAsLiminalBeingCommunitasHanKang", "title": "리미널리티 존재자로서의 '귀신'과 커뮤니타스: '사회적 드라마'로 읽는 한강 소설의 의미", "author": "전성욱", "year": "2022", "venue": "감성연구", "url": "", "pdf": "", "summary": "한강 소설 속 '귀신'을 삶과 죽음 사이의 리미널 존재자로 해석하고, 터너의 '사회적 드라마(social drama)' 개념을 적용해 트라우마와 그로부터 형성되는 커뮤니타스를 분석한다.", "keywords": ["리미널리티", "커뮤니타스", "환상성", "스토리텔링", "한강"]}, {"slug": "2022_KimBobin_IsekaiAlienationHeterotopia", "title": "이세계물 서사의 소외성과 헤테로토피아", "author": "김보빈", "year": "2022", "venue": "인문콘텐츠", "url": "", "pdf": "", "summary": "한국 웹소설/웹툰의 \"이세계물(異世界物)\" 장르를 푸코의 헤테로토피아 개념으로 분석하며, 현실에서 소외된 주체가 이세계로 전이(異世界 轉移)됨으로써 현실 질서를 상대화하는 대안 공간을 획득하는 구조를 논한다.", "keywords": ["이세계물", "웹소설", "헤테로토피아", "포탈", "일상", "허구"]}, {"slug": "2022_KimGwanggeon_UnderstandingLiminality", "title": "리미널리티(liminality) 개념의 다각적 이해", "author": "김광건", "year": "2022", "venue": "신학과 실천", "url": "", "pdf": "", "summary": "반 게넵-터너의 리미널리티 개념을 신학·목회적 관점에서 재조명하며, 개념의 인류학적 기원부터 현대적 응용까지 국내 독자를 위해 종합적으로 정리한 개념사 논문.", "keywords": ["리미널리티", "통과의례", "커뮤니타스"]}, {"slug": "2023_DavisonVecchioneSeeger_LeGuinSpeculativeAnthropology", "title": "Ursula Le Guin's Speculative Anthropology", "author": "Daniel Davison-Vecchione, Sean Seeger", "year": "2023", "venue": "Theory, Culture & Society", "url": "", "pdf": "", "summary": "어슐러 르 귄의 SF 작품을 \"사변적 인류학(speculative anthropology)\"으로 독해하며, 대안 사회·문화 체계를 상상함으로써 현실 사회 구조를 비판적으로 되비추는 서사 전략을 분석한다. 사변소설이 사회학적 사고실험의 도구로 기능하는 방식을 이론화한다.", "keywords": ["사변소설", "SF", "세계관", "월드빌딩", "스토리텔링"]}, {"slug": "2023_Kraatila_WorldBuildingGrandScaleSpeculation", "title": "World-Building as Grand-Scale Speculation", "author": "Elise Kraatila", "year": "2023", "venue": "Fafnir", "url": "", "pdf": "", "summary": "사변소설의 세계구축(world-building)을 개별 사건의 예측이 아니라 \"대규모 사변(grand-scale speculation)\" 행위로 재정의하며, 허구 세계 전체의 논리·역사·시스템을 상상하는 작업이 갖는 인식론적·미학적 함의를 논한다.", "keywords": ["월드빌딩", "세계관", "사변소설", "허구", "스토리텔링"]}, {"slug": "2024_MacchiJanicaGrava_NavigatingInBetween", "title": "Navigating the in-between: liminal spaces in video game geographies", "author": "Macchi Jánica, Grava", "year": "2024", "venue": "GeoJournal", "url": "", "pdf": "", "summary": "지리학적 방법론을 사용해 비디오게임 속 리미널 공간의 구성 요소를 분석하고, 게임 지리학에서 리미널 공간을 이루는 4대 구성축을 도출한다.", "keywords": ["게임", "리미널리티", "공간디자인", "문턱공간", "월드빌딩"]}, {"slug": "2024_SeoYuhwaJoTaekyeon_NeuralPerceptionLiminalSpace", "title": "리미널 스페이스의 시각 인지와 선호에 관한 신경학적 연구", "author": "서유화, 조택연", "year": "2024", "venue": "한국공간디자인학회논문집", "url": "", "pdf": "", "summary": "인터넷 밈으로 유행한 '리미널 스페이스' 이미지(백룸류 공간)에 대한 인간의 시각적 인지와 미적 선호를 신경과학적 방법론(뇌파, 시선추적 등)으로 실증 분석한 최신 국내 연구.", "keywords": ["리미널리티", "백룸", "언캐니", "공간디자인", "문턱공간"]}, {"slug": "2025_ChaneyGoulding_ExploringNuancesOfLiminality", "title": "Exploring nuances of liminality: Unbridled, oriented, restrained liminality in cultural rituals", "author": "Damien Chaney, Christina Goulding", "year": "2025", "venue": "Marketing Theory", "url": "", "pdf": "", "summary": "문화적 의례에서 나타나는 리미널 단계를 무구속(unbridled), 지향(oriented), 억제(restrained) 리미널리티 3유형으로 세분화하여, 리미널 경험의 강도와 통제 정도에 따른 차이를 이론화한 최신 논문.", "keywords": ["리미널리티", "통과의례", "소비자행동", "경험설계"]}, {"slug": "2025_Haggar_CommunitasRevisited", "title": "Communitas revisited", "author": "Sarah Haggar", "year": "2025", "venue": "Anthropological Theory", "url": "", "pdf": "", "summary": "빅터 터너의 커뮤니타스(communitas) 개념을 현대 인류학 이론의 관점에서 재검토하며, 리미널 단계에서 발생하는 위계 없는 평등적 연대감이 현대 사회의 다양한 집단 경험(디지털 커뮤니티 포함)에서 어떻게 변주되는지 논한다.", "keywords": ["커뮤니타스", "리미널리티", "통과의례"]}, {"slug": "2025_JoHyejin_ParkKyungriTojiLiminality", "title": "박경리 소설 『토지』의 리미널리티 연구", "author": "조혜진", "year": "2025", "venue": "한남어문학", "url": "", "pdf": "", "summary": "박경리의 대하소설 『토지』를 이주공간, 신분변화, 역사인식이라는 3중 리미널리티 구조로 분석하여, 한국 근현대사를 배경으로 한 서사 속 인물들의 경계적 존재 양상을 규명한다.", "keywords": ["리미널리티", "통과의례", "스토리텔링", "토지"]}, {"slug": "2025_KravchenkoEtAl_LiminalityAndTheMetaverse", "title": "Liminality and the metaverse: mytho-liminal and mystic-liminal games and player identity", "author": "Kravchenko, Chaika, Yudenko, Muntian", "year": "2025", "venue": "Metaverse", "url": "", "pdf": "https://aber.apacsci.com/index.php/met/article/viewFile/3102/3647", "summary": "메타버스 게임을 '뮈토-리미널(mytho-liminal)'과 '미스틱-리미널(mystic-liminal)' 유형으로 분류하고, 각 유형에서 아바타를 통한 플레이어 정체성 전이가 어떻게 다르게 작동하는지 분석한다.", "keywords": ["메타버스", "리미널리티", "게임", "아바타", "체현"]}, {"slug": "2025_OhYunho_21stCenturySpeculativeFictionPosthuman", "title": "21세기 사변소설과 포스트휴먼 형상들", "author": "오윤호", "year": "2025", "venue": "대중서사연구", "url": "", "pdf": "", "summary": "21세기 한국 사변소설에 나타난 포스트휴먼 형상(사이보그, AI, 이종 존재 등)을 분석하며, 사변소설이 인간/비인간 경계의 재구성을 통해 현재의 기술·사회 조건을 성찰하는 방식을 논한다.", "keywords": ["사변소설", "포스트휴먼", "SF", "스토리텔링"]}, {"slug": "2025_Unknown_ReactionsToVideoGamesEvokeLiminality", "title": "Reactions to video games that evoke a feeling of liminality", "author": "저자 미상 — 확인 대기 (원문 PDF 재확인 권장)", "year": "2025", "venue": "Entertainment Computing", "url": "", "pdf": "", "summary": "백룸류 리미널 공간 미학을 유발하는 비디오게임에 대한 플레이어 반응을 대규모 텍스트마이닝/설문 방법론으로 실증 분석한 논문. sciencedirect 접근 제한으로 저자명 확정 불가하나 논문 존재 자체는 확인됨.", "keywords": ["게임", "리미널리티", "백룸", "언캐니", "경험설계"]}, {"slug": "2026_DuMingyangChoiIkseo_BackroomsSpatialPhilosophyArchitecturalCritique", "title": "'백룸(The Backrooms)'의 공간 철학과 건축적 비판: 기능을 박탈당한 비장소와 건축적 기괴함", "author": "두밍양, 최익서", "year": "2026", "venue": "한국공간디자인학회논문집", "url": "", "pdf": "", "summary": "인터넷 밈 '백룸(The Backrooms)'을 건축비평과 게임분석을 교차하여 검토한다. 기능을 박탈당한 비장소(non-place)가 신체적·존재론적 위기를 촉발하는 '건축적 기괴함(architectural uncanny)'의 메커니즘을 규명한다.", "keywords": ["백룸", "언캐니", "문턱공간", "비장소", "건축", "리미널리티", "게임"]}, {"slug": "Sogutluler_ExperiencingLiminalSpacesUncannyAtmospheres", "title": "Experiencing Liminal Spaces and Uncanny Atmospheres in Video Games", "author": "T. Söğütlüler", "year": "연도 미상 (학회 발표집)", "venue": "Artemis Scientific Research Congress", "url": "", "pdf": "https://unis.karabuk.edu.tr/app_files/2025/12/Yayin_Pdf_61253_df5ebb2b.pdf", "summary": "비디오게임 속 리미널 공간이 유발하는 언캐니(uncanny)한 분위기를 질적으로 분석한 학회 발표 논문. 백룸류 게임 공간의 미학적·정동적 특성을 정리한다. 정식 저널이 아닌 학회 발표집이라 학술적 비중은 상대적으로 낮음.", "keywords": ["게임", "언캐니", "리미널리티", "백룸", "공간디자인"]}, {"slug": "Unknown_AtTheThresholdLiminalityArchitecture", "title": "At the Threshold: Liminality, Architecture, and the Hidden Language of Space", "author": "저자 미상 — 확인 대기 (석사논문, 원문 PDF 재확인 권장)", "year": "연도 미상", "venue": "University of Texas at Austin (석사학위논문)", "url": "", "pdf": "https://repositories.lib.utexas.edu/bitstreams/95121151-0b8a-4db5-a3ea-edba873edecd/download", "summary": "문턱(threshold) 개념을 중심으로 건축 공간에 내재된 '숨겨진 언어'를 리미널리티 이론으로 해독하는 석사논문. 공간의 경계 요소가 어떻게 신체적·인지적 이행 경험을 유도하는지 탐구한다.", "keywords": ["문턱공간", "건축", "리미널리티", "공간디자인"]}, {"slug": "Unknown_LiminalSpaceInArchitectureThresholdTransition", "title": "Liminal Space in Architecture: Threshold and Transition", "author": "저자 미상 — 확인 대기 (석사논문, 원문 PDF 재확인 권장)", "year": "연도 미상", "venue": "University of Tennesse // ---- structured initial layout (prevents the long chaotic settling on load) ----
// keywords: golden-angle spiral, most-connected at the center
{
  const kws = nodes.filter(n=>n.type==='kw').sort((a,b)=>b.deg-a.deg);
  const GA = Math.PI*(3-Math.sqrt(5));
  kws.forEach((n,i)=>{
    const r = 90*Math.sqrt(i+0.5) * 1.9;
    const th = i*GA;
    n.x = Math.cos(th)*r; n.y = Math.sin(th)*r;
  });
  // papers: centroid of their keywords + jitter ring
  papers.forEach(p=>{
    const n = p._node;
    const anchors = p.keywords.map(k=>kwNode[k]).filter(Boolean);
    if(anchors.length){
      let cx=0, cy=0;
      anchors.forEach(a=>{ cx+=a.x; cy+=a.y; });
      cx/=anchors.length; cy/=anchors.length;
      const th = Math.random()*Math.PI*2, rr = 40+Math.random()*70;
      n.x = cx + Math.cos(th)*rr; n.y = cy + Math.sin(th)*rr;
    }
  });
}

// measure pill sizes (offscreen ctx)
const meas = document.createElement('canvas').getContext('2d');
function pillDims(n){
  // font size 8.5px (least-linked) .. 8.5+20px (most-linked); sizeContrast bends the curve:
  // >1 = big keywords stand out more (small ones shrink), <1 = sizes even out
  const t = Math.pow(n.degNorm, S.sizeContrast);
  const fs = (8.5 + 20*t) * S.nodeScale;
  meas.font = '600 ' + fs + 'px "Gothic A1", sans-serif';
  const tw = meas.measureText(disp(n)).width;
  const padX = fs*0.75, padY = fs*0.42;
  return { w: tw + padX*2, h: fs + padY*2, fs };
}

function kwNeighborhood(kn){
  // keyword + its papers + the co-occurring keywords of those papers (2-hop)
  const s=new Set([kn.id]);
  (adj[kn.id]||[]).forEach(pid=>{
    s.add(pid);
    (adj[pid]||[]).forEach(kid=>s.add(kid));
  });

}

}

  return n.rBase*S.nodeScale;

function step(){
  if(alpha<0.005) return;
  const cell=150, grid={};
  nodes.forEach(n=>{ const gx=Math.floor(n.x/cell), gy=Math.floor(n.y/cell); const key=gx+','+gy; (grid[key]=grid[key]||[]).push(n); });
  nodes.forEach(a=>{
    const gx=Math.floor(a.x/cell), gy=Math.floor(a.y/cell);
    for(let ix=gx-1;ix<=gx+1;ix++) for(let iy=gy-1;iy<=gy+1;iy++){
      const bucket=grid[ix+','+iy]; if(!bucket) continue;
      bucket.forEach(b=>{
        if(a===b) return;
        let dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy+1;
        if(d2>cell*cell*2.4) return;
        const base=(a.type==='kw'&&b.type==='kw')?1600:240;
        const f=base*S.repelForce/d2*alpha;
        const d=Math.sqrt(d2);
        a.vx+=dx/d*f; a.vy+=dy/d*f;
      });
    }
  });
  links.forEach(l=>{
    let dx=l.t.x-l.s.x, dy=l.t.y-l.s.y, d=Math.sqrt(dx*dx+dy*dy)+0.01;
    const f=(d-S.linkDist)*0.007*S.linkForce*alpha;
    dx/=d; dy/=d;
    l.s.vx+=dx*f; l.s.vy+=dy*f; l.t.vx-=dx*f; l.t.vy-=dy*f;
  });
  nodes.forEach(n=>{
    n.vx-=n.x*0.0012*S.centerForce*alpha; n.vy-=n.y*0.0012*S.centerForce*alpha;
    n.vx*=0.75; n.vy*=0.75;
    n.x+=n.vx; n.y+=n.vy;
  });
  alpha*=0.998;
}

// hard collision resolution — keyword pills treated as rectangles, papers as circles; runs every frame
function collide(){
  const cell=300, grid={};
  nodes.forEach(n=>{ const gx=Math.floor(n.x/cell), gy=Math.floor(n.y/cell); (grid[gx+','+gy]=grid[gx+','+gy]||[]).push(n); });
  const PAD=6;
  nodes.forEach(a=>{
    const gx=Math.floor(a.x/cell), gy=Math.floor(a.y/cell);

      const bucket=grid[ix+','+iy]; if(!bucket) continue;
      bucket.forEach(b=>{
        if(a===b || a.id>=b.id) return;
        if(a.type==='kw' && b.type==='kw'){

          }

          const ra = a.type==='kw'? null : a.rBase*S.nodeScale;

          } else {
            // circle (paper) vs rect (pill): clamp-point distance
            const kw = a.type==='kw'? a : b, pp = a.type==='kw'? b : a;
            const d0 = pillDims(kw), hw=d0.w/2+3, hh=d0.h/2+3, r=(pp.rBase*S.nodeScale)+2;
            const cx=Math.max(kw.x-hw, Math.min(pp.x, kw.x+hw));
            const cy=Math.max(kw.y-hh, Math.min(pp.y, kw.y+hh));
            let dx=pp.x-cx, dy=pp.y-cy, d=Math.sqrt(dx*dx+dy*dy);
            if(d<r){
              if(d<0.01){ dx=pp.x-kw.x; dy=pp.y-kw.y; d=Math.sqrt(dx*dx+dy*dy)+0.01; }
              const push=(r-d);
              pp.x+=dx/d*push; pp.y+=dy/d*push;
            }
          }
        }
      });
    }
  });
}
function reheat(v){ alpha=Math.max(alpha,v); }

const BG = [255,255,255]; // #ffffff (기본 배경)
function mixToBg(hex, keep){
  // keep=1 → original color, keep=0 → background; returns opaque rgb()
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return 'rgb('+Math.round(r*keep+BG[0]*(1-keep))+','+Math.round(g*keep+BG[1]*(1-keep))+','+Math.round(b*keep+BG[2]*(1-keep))+')';
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function drawArrow(x1,y1,x2,y2,r2){
  // arrowhead near target, offset by target radius
  const dx=x2-x1, dy=y2-y1, d=Math.sqrt(dx*dx+dy*dy)+0.01;
  const ux=dx/d, uy=dy/d;
  const tx=x2-ux*(r2+4), ty=y2-uy*(r2+4);
  const sz=5;
  ctx.beginPath();
  ctx.moveTo(tx,ty);
  ctx.lineTo(tx-ux*sz-uy*sz*0.6, ty-uy*sz+ux*sz*0.6);
  ctx.lineTo(tx-ux*sz+uy*sz*0.6, ty-uy*sz-ux*sz*0.6);
  ctx.closePath();
  ctx.fill();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(W/2+cam.x,H/2+cam.y); ctx.scale(cam.z,cam.z);
  const hl=computeHighlight();
  const kwSelected = (selNode && selNode.type==='kw') || !!activeKw;

  // per-node eased highlight level (smooth fade instead of hard jumps)
  nodes.forEach(n=>{
    let target;
    const on = !hl || hl.has(n.id);
    if(n.type==='kw'){
      const isFocus = (selNode===n) || (hoverNode===n) || (activeKw===n.label);
      if(!hl) target = 1;
      else if(isFocus) target = 1;
      else if(on) target = 1;
      else target = 0.05;
    } else {
      target = on ? 1 : 0.06;
    }
    n.aCur = (n.aCur===undefined) ? target : n.aCur + (target - n.aCur) * 0.16;
  });

  const bgLum = BG[0]*0.299 + BG[1]*0.587 + BG[2]*0.114;
  const edgeRGB = bgLum > 140 ? '90,92,100' : '160,160,172';
  hlEase += ((hl ? 1 : 0) - hlEase) * 0.16;
  const textAlpha = Math.max(0, Math.min(1,(cam.z - S.textStart)*3));

  function drawLink(l){
    const m = Math.min(l.s.aCur===undefined?1:l.s.aCur, l.t.aCur===undefined?1:l.t.aCur);
    const t = Math.max(0, Math.min(1, (m - 0.06) / 0.94));
    // idle: width 1 / alpha 0.20 — highlight active: connected links width 3 / alpha 0.5, others thin & faint
    const a = (1-hlEase)*0.20 + hlEase*(0.06 + 0.44*t);
    const w = (1-hlEase)*1 + hlEase*(0.7 + 2.3*t);
    ctx.strokeStyle = 'rgba(' + edgeRGB + ',' + a.toFixed(3) + ')';
    ctx.lineWidth = w * S.linkWidth / cam.z;
    ctx.beginPath(); ctx.moveTo(l.s.x,l.s.y); ctx.lineTo(l.t.x,l.t.y); ctx.stroke();
    if(S.arrows && t > 0.5){
      ctx.globalAlpha = t;
      ctx.fillStyle='rgba(165,165,178,0.45)';
      drawArrow(l.s.x,l.s.y,l.t.x,l.t.y, nodeCollideR(l.t));
      ctx.globalAlpha = 1;
    }
  }

  function drawPaper(n){
    const isClickedP = selNode===n;
    const r = (n.rBase*S.nodeScale) * (isClickedP ? 1.8 : 1);
    ctx.beginPath(); ctx.arc(n.x,n.y,r,0,7);
    ctx.globalAlpha = n.aCur;
    if(isClickedP){
      const tsec = performance.now()/1000;
      const h = (tsec*90) % 360;
      const g = ctx.createLinearGradient(n.x-r, n.y-r, n.x+r, n.y+r);
      g.addColorStop(0,   'hsl('+h+',95%,58%)');
      g.addColorStop(0.5, 'hsl('+((h+90)%360)+',95%,52%)');
      g.addColorStop(1,   'hsl('+((h+180)%360)+',95%,58%)');
      ctx.fillStyle = g;
    } else {
      ctx.fillStyle = n.color;
    }
    ctx.fill(); ctx.globalAlpha=1;
    if(selNode===n||hoverNode===n||panelHoverNode===n){ ctx.strokeStyle = bgLum > 140 ? '#17171a' : '#ffffff'; ctx.lineWidth=1.4/cam.z; ctx.stroke(); }
  }

  function drawPill(n){
    const d = pillDims(n);
    const x=n.x-d.w/2, y=n.y-d.h/2;
    const isEntity = n.cluster==='사례·IP';
    const keep = n.aCur;
    roundRect(x,y,d.w,d.h,d.h/2);
    const isClicked = (selNode===n) || (activeKw===n.label);
    if(isClicked){
      // moving rainbow gradient so the clicked keyword is unmistakable even without hover
      const tsec = performance.now()/1000;
      const h = (tsec*90) % 360;
      const g = ctx.createLinearGradient(x, y, x+d.w, y+d.h);
      g.addColorStop(0,   'hsl('+h+',95%,58%)');
      g.addColorStop(0.5, 'hsl('+((h+90)%360)+',95%,52%)');
      g.addColorStop(1,   'hsl('+((h+180)%360)+',95%,58%)');
      ctx.fillStyle = g;
    } else {
      ctx.fillStyle = isEntity ? 'rgb('+BG[0]+','+BG[1]+','+BG[2]+')' : mixToBg(n.color, keep);
    }
    ctx.fill();
    if(isEntity){
      ctx.strokeStyle = mixToBg(n.color, keep); ctx.lineWidth=1.2/Math.sqrt(cam.z); ctx.stroke();
    }
    const pr=parseInt(n.color.slice(1,3),16), pg=parseInt(n.color.slice(3,5),16), pb=parseInt(n.color.slice(5,7),16);
    const pillLum = pr*0.299 + pg*0.587 + pb*0.114;
    if(!isEntity && bgLum > 140 && pillLum > 210){ ctx.strokeStyle = mixToBg('#c3c5cc', keep); ctx.lineWidth=1/Math.sqrt(cam.z); ctx.stroke(); }
    if(n.label===activeKw || selNode===n || hoverNode===n){
      ctx.strokeStyle = bgLum > 140 ? '#17171a' : '#ffffff'; ctx.lineWidth=2.2/Math.sqrt(cam.z); ctx.stroke();
    }
    // pill text (also pre-blended, kept opaque)
    if(textAlpha>0.02){
      ctx.globalAlpha = textAlpha;
      ctx.font='600 '+d.fs+'px "Gothic A1", sans-serif';
      ctx.fillStyle = isClicked ? '#ffffff' : (isEntity? mixToBg(n.color, keep) : mixToBg(pillLum > 150 ? '#141418' : '#ffffff', keep));
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(disp(n), n.x, n.y+d.fs*0.06);
      ctx.textBaseline='alphabetic';
      ctx.globalAlpha=1;
    }
  }

  // ---- z-order ----
  // idle: 링크 → 논문 → 피봇(아이콘 우선).
  // 하이라이트 중: 비관련 요소를 먼저 깔고, 하이라이트된 링크를 그 위에, 하이라이트된 노드를 맨 위에
  // (비관련 피봇이 연결선을 끊어 보이게 하지 않도록).
  if(!hl){
    links.forEach(drawLink);
    nodes.forEach(n=>{ if(n.type==='paper') drawPaper(n); });
    nodes.forEach(n=>{ if(n.type==='kw') drawPill(n); });
  } else {
    const inHl = n => hl.has(n.id);
    const linkHl = l => hl.has(l.s.id) && hl.has(l.t.id);
    // 1. dimmed layer (unrelated)
    links.forEach(l=>{ if(!linkHl(l)) drawLink(l); });
    nodes.forEach(n=>{ if(n.type==='paper' && !inHl(n)) drawPaper(n); });
    nodes.forEach(n=>{ if(n.type==='kw' && !inHl(n)) drawPill(n); });
    // 2. highlighted links ABOVE dimmed pills so connections never look cut
    links.forEach(l=>{ if(linkHl(l)) drawLink(l); });
    // 3. highlighted nodes on top
    nodes.forEach(n=>{ if(n.type==='paper' && inHl(n)) drawPaper(n); });
    nodes.forEach(n=>{ if(n.type==='kw' && inHl(n)) drawPill(n); });
  }

  // paper labels — only on direct hover of the dot, selection of the paper, or hover on the inspector list item
  nodes.forEach(n=>{
    if(n.type!=='paper') return;
    const active = hoverNode===n || selNode===n || panelHoverNode===n;
    if(!active) return;
    const r = n.rBase*S.nodeScale;
    ctx.globalAlpha=0.95;
    ctx.fillStyle = bgLum > 140 ? '#4a4e58' : '#a6abb6';
    ctx.font='8.5px "Gothic A1", sans-serif';
    ctx.textAlign='center';
    const label = n.label.length>30? n.label.slice(0,29)+'…' : n.label;
    ctx.fillText(label, n.x, n.y-r-5);
    ctx.globalAlpha=1;
  });

  ctx.restore();
}
// pre-warm: settle the layout off-screen so the page opens calm instead of bouncing
for(let i=0;i<220;i++){ step(); collide(); }
alpha = 0.06;
nodes.forEach(n=>{ n.vx=0; n.vy=0; });
(function loop(){ step(); collide(); easeZoom(); draw(); requestAnimationFrame(loop); })();

// ---- interaction ----
let drag=null, panning=false, px=0, py=0, moved=false;
function pick(mx,my){
  const x=(mx-W/2-cam.x)/cam.z, y=(my-H/2-cam.y)/cam.z;
  for(let i=nodes.length-1;i>=0;i--){
    const n=nodes[i];
    if(n.type==='kw'){
      const d=pillDims(n);
      if(Math.abs(x-n.x)<=d.w/2+3 && Math.abs(y-n.y)<=d.h/2+3) return n;
    } else {
      const rr=Math.max(n.rBase*S.nodeScale+3, 6/cam.z);
      const dx=x-n.x, dy=y-n.y;
      if(dx*dx+dy*dy<rr*rr) return n;
    }
  }
  return null;
}
cv.addEventListener('mousedown',e=>{
  moved=false;
  const n=pick(e.clientX,e.clientY);
  if(n){ drag=n; } else { panning=true; px=e.clientX; py=e.clientY; }
});
addEventListener('mouseup',e=>{
  if(!moved && e.target===cv){
    const n=pick(e.clientX,e.clientY);
    if(n) selectNode(n);
    else { selNode=null; closePanel(); }
  }
  drag=null; panning=false;
});
cv.addEventListener('mousemove',e=>{
  if(drag){ moved=true; drag.x=(e.clientX-W/2-cam.x)/cam.z; drag.y=(e.clientY-H/2-cam.y)/cam.z; drag.vx=drag.vy=0; reheat(0.05); return; }
  if(panning){ moved=true; cam.x+=e.clientX-px; cam.y+=e.clientY-py; px=e.clientX; py=e.clientY; return; }
  const n=pick(e.clientX,e.clientY);
  hoverNode=n;
  cv.style.cursor=n?'pointer':'default';
});
// smooth zoom: target-based easing instead of stepped jumps
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  // proportional to wheel delta, much gentler per tick
  const f = Math.exp(-e.deltaY * 0.0012);
  zoomTarget = Math.max(0.15, Math.min(4.5, zoomTarget * f));
  zoomAnchor.x = e.clientX; zoomAnchor.y = e.clientY;
},{passive:false});
function easeZoom(){
  if(Math.abs(zoomTarget - cam.z) > 0.0005){
    const nz = cam.z + (zoomTarget - cam.z) * 0.18;   // ease toward target
    const wx=(zoomAnchor.x-W/2-cam.x)/cam.z, wy=(zoomAnchor.y-H/2-cam.y)/cam.z;
    cam.x=zoomAnchor.x-W/2-wx*nz; cam.y=zoomAnchor.y-H/2-wy*nz; cam.z=nz;
  }
}

// ---- panel ----
function chipCss(k){
  const kn = kwNode[k];
  if(!kn) return '';
  const c = kn.color;
  if(kn.cluster==='사례·IP') return 'background:transparent;border:1.5px solid '+c+';color:'+c+';';
  const pr=parseInt(c.slice(1,3),16), pg=parseInt(c.slice(3,5),16), pb=parseInt(c.slice(5,7),16);
  const lum = pr*0.299 + pg*0.587 + pb*0.114;
  return 'background:'+c+';color:'+(lum>150?'#141418':'#ffffff')+';';
}
function paperHtml(p){
  return '<div class="paper" data-slug="'+p.slug+'">'+
    '<div class="t">'+p.title+'</div>'+
    '<div class="m">'+p.author+' ('+p.year+') · '+p.venue+'</div>'+
    '<div class="kws">'+p.keywords.map(k=>'<span style="'+chipCss(k)+'">'+k+'</span>').join('')+'</div>'+
    '<div class="s">'+p.summary+'<br>'+
      (p.url?'<a href="'+p.url+'" target="_blank">DB 페이지 ↗</a>':'')+
      (p.pdf?'<a href="'+p.pdf+'" target="_blank" style="color:#ff5555;margin-left:10px">PDF ↗</a>':'')+
      '</div></div>';
}
function selectNode(n){
  selNode=n;
  const panel=document.getElementById('panel');
  const t=document.getElementById('panelTitle'), sub=document.getElementById('panelSub'), body=document.getElementById('panelBody');
  if(n.type==='kw'){
    activeKw=n.label; syncChips();
    const ps=papers.filter(p=>p.keywords.includes(n.label));
    t.textContent=n.label;
    t.style.fontSize='';
    t.style.display='';
    t.style.padding='';
    t.style.borderRadius='';
    t.style.marginBottom='';
    t.style.background='';
    t.style.border='';
    sub.textContent=keywords.find(k=>k.name===n.label).cluster+' / '+ps.length+'편';
    body.innerHTML=ps.map(paperHtml).join('');
  } else {
    const p=n.paper;
    activeKw=null; syncChips();
    t.textContent='논문';
    t.style.fontSize='';
    t.style.display='';
    t.style.padding='';
    t.style.borderRadius='';
    t.style.background='';
    t.style.border='';
    t.style.marginBottom='';
    t.style.color='';
    sub.textContent='1편';
    body.innerHTML = paperHtml(p);
    body.querySelectorAll('.kws span').forEach(s=>s.addEventListener('click',()=>{ const kn=kwNode[s.textContent]; if(kn) selectNode(kn); }));
  }
  panel.classList.add('show');
  body.querySelectorAll('.paper').forEach(el=>{
    el.addEventListener('mouseenter',()=>{
      const pp = papers.find(x=>x.slug===el.dataset.slug);
      panelHoverNode = pp ? pp._node : null;
    });
    el.addEventListener('mouseleave',()=>{ panelHoverNode = null; });
  });
}
function closePanel(){ document.getElementById('panel').classList.remove('show'); selNode=null; activeKw=null; panelHoverNode=null; syncChips(); }

// ---- DB table modal ----
let dbSort = {key:'year', dir:-1};
function dbRows(filter){
  let rows = papers.map(p=>({year:p.year,title:p.title,author:p.author,venue:p.venue,keywords:p.keywords,url:p.url,pdf:p.pdf}));
  if(filter){
    const f = filter.toLowerCase();
    rows = rows.filter(r => (r.title+' '+r.author+' '+r.venue+' '+r.keywords.join(' ')+' '+r.year).toLowerCase().includes(f));
  }
  const k = dbSort.key, d = dbSort.dir;
  rows.sort((a,b)=>{
    let va=a[k]||'', vb=b[k]||'';
    if(k==='keywords'){ va=a.keywords.length; vb=b.keywords.length; }
    if(va<vb) return -1*d; if(va>vb) return 1*d; return 0;
  });
  return rows;
}
function renderDb(){
  const filter = document.getElementById('dbSearch').value.trim();
  const rows = dbRows(filter);
  const cols = [['year','연도'],['title','제목'],['author','저자'],['venue','학술지/출처'],['keywords','핵심키워드'],['links','링크']];
  let html = '<thead><tr>' + cols.map(c=>{

  }).join('') + '</tr></thead><tbody>';
  rows.forEach(r=>{
    const kws = r.keywords.map(k=>{
      const kn=kwNode[k]; if(!kn) return '<span>'+k+'</span>';
      const c=kn.color, pr=parseInt(c.slice(1,3),16),pg=parseInt(c.slice(3,5),16),pb=parseInt(c.slice(5,7),16);
      const lum=pr*0.299+pg*0.587+pb*0.114;
      if(kn.cluster==='사례·IP') return '<span style="background:transparent;border:1px solid '+c+';color:'+c+'">'+k+'</span>';
      return '<span style="background:'+c+';color:'+(lum>150?'#141418':'#fff')+'">'+k+'</span>';
    }).join('');
    const links = (r.url?'<a href="'+r.url+'" target="_blank">DB ↗</a>':'') + (r.pdf?'<a class="pdf" href="'+r.pdf+'" target="_blank">PDF ↗</a>':'');
    html += '<tr><td>'+r.year+'</td><td>'+r.title+'</td><td>'+r.author+'</td><td>'+r.venue+'</td><td class="kw">'+kws+'</td><td>'+links+'</td></tr>';
  });
  html += '</tbody>';
  const tbl = document.getElementById('dbTable');
  tbl.innerHTML = html;
  tbl.querySelectorAll('th').forEach(th=>th.addEventListener('click',()=>{
    const k=th.dataset.k;
    if(dbSort.key===k) dbSort.dir*=-1; else { dbSort.key=k; dbSort.dir=(k==='year'?-1:1); }
    renderDb();
  }));
  document.getElementById('dbCount').textContent = filter ? ('('+rows.length+'/'+papers.length+')') : '';
}
function openDb(){ document.getElementById('dbTotal').textContent = papers.length; renderDb(); document.getElementById('dbModal').classList.add('show'); }
function closeDb(){ document.getElementById('dbModal').classList.remove('show'); }
document.getElementById('dbSearch').addEventListener('input', renderDb);
document.getElementById('dbModal').addEventListener('click', e=>{ if(e.target.id==='dbModal') closeDb(); });
addEventListener('keydown', e=>{ if(e.key==='Escape') closeDb(); });
// ---- per-cluster color pickers (gradient palette via native color picker) ----
function applyClusterColor(clusterName, color){
  const cl = clusters.find(c=>c.name===clusterName);
  if(cl) cl.color = color;
  keywords.forEach(k=>{ if(k.cluster===clusterName) k.color = color; });
  nodes.forEach(n=>{ if(n.type==='kw' && n.cluster===clusterName) n.color = color; });
  buildFilters(); syncChips();
  // update legend row in place (rebuilding would kill the open picker)
  const row = document.querySelector('#legend .lrow[data-cluster="'+clusterName+'"]');
  if(row){
    const sw = row.querySelector('i');
    if(clusterName==='사례·IP'){ sw.style.background='transparent'; sw.style.border='1.5px solid '+color; }
    else sw.style.background = color;
    row.querySelector('.lhex').textContent = color;
  }

}

document.getElementById('filterBtn').addEventListener('click',function(){
  const f=document.getElementById('filters');
  const showing=f.classList.toggle('show');
  this.classList.toggle('on', showing);
  placeLegend();
});
// click outside to close the bottom-right popups (filters / legend / settings)
addEventListener('mousedown', function(e){
  const panels = [['filters','filterBtn'],['legend','colorBtn'],['settings','physBtn']];
  panels.forEach(([panelId, btnId])=>{
    const panel = document.getElementById(panelId);
    if(!panel.classList.contains('show')) return;
    const btn = document.getElementById(btnId);
    if(panel.contains(e.target) || btn.contains(e.target)) return; // click inside panel or its toggle
    panel.classList.remove('show');
    btn.classList.remove('on');
  });
  placeLegend();
});
document.getElementById('langBtn').addEventListener('click', function(){
  LANG = (LANG==='ko') ? 'en' : 'ko';
  this.textContent = (LANG==='ko') ? '한/A' : 'A/한';
  this.classList.toggle('on', LANG==='en');
  // pill widths change with language — resolve overlaps instantly (off-screen) so it doesn't visibly bounce for long
  for(let i=0;i<90;i++) collide();
  reheat(0.05);
});
buildFilters(); buildLegend();
// keep legend stacked right above the settings panel
function placePanel(){
  const byline = document.querySelector('#title .byline');
  const bottom = byline.getBoundingClientRect().bottom;
  document.getElementById('panel').style.top = Math.max(14, Math.round(bottom + 50)) + 'px';
}
placePanel();
addEventListener('resize', placePanel);

function placeLegend(){
  // stack visible bottom-left panels above the icon buttons: settings -> legend -> filters
  let cur = 64;
  ['settings','legend','filters'].forEach(id=>{
    const el = document.getElementById(id);
    if(el.classList.contains('show')){
      el.style.bottom = cur + 'px';
      cur += el.offsetHeight + 8;
    }
  });
}
placeLegend();
addEventListener('resize', placeLegend);
document.getElementById('colorBtn').addEventListener('click', function(){
  const lg = document.getElementById('legend');
  const showing = lg.classList.toggle('show');
  this.classList.toggle('on', showing);
  placeLegend();
});
document.getElementById('physBtn').addEventListener('click', function(){
  const st = document.getElementById('settings');
  const showing = st.classList.toggle('show');
  this.classList.toggle('on', showing);
  placeLegend();
});

// ---- settings wiring ----
function bindRange(id, valId, key, fmt){
  const el=document.getElementById(id), val=document.getElementById(valId);
  el.addEventListener('input',()=>{
    S[key]=parseFloat(el.value);
    val.textContent = fmt? fmt(S[key]) : S[key].toFixed(1);
    reheat(0.3);
  });
}
bindRange('sNode','vNode','nodeScale');
bindRange('sContrast','vContrast','sizeContrast');
bindRange('sLinkW','vLinkW','linkWidth');
bindRange('sCenter','vCenter','centerForce');
bindRange('sRepel','vRepel','repelForce');
bindRange('sLinkF','vLinkF','linkForce');
bindRange('sLinkD','vLinkD','linkDist', v=>String(Math.round(v)));
document.getElementById('sArrow').addEventListener('click',function(){
  S.arrows=!S.arrows;
  this.classList.toggle('on', S.arrows);
});
</script>
